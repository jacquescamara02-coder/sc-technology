workflows:

  ios-workflow:
    name: SC Technologie iOS
    max_build_duration: 60
    environment:
      xcode: latest
      node: 24.15.0
      groups:
        - ios_credentials
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web
        script: |
          npm run build:mobile
      - name: Create native index.html
        script: |
          python3 - <<'PY'
          from pathlib import Path

          assets = Path('mobile-dist/client/assets')
          entry = None
          for candidate in sorted(assets.glob('*.js')):
              text = candidate.read_text(errors='ignore')
              if 'hydrateRoot(document' in text:
                  entry = candidate
                  break

          if entry is None:
              raise SystemExit('Native build failed: React entry bundle not found')

          js = entry.read_text(errors='ignore')
          js = js.replace(
              'throw new Error("Invariant failed: Expected to find a match below the root match in SPA mode.");',
              'console.warn("SPA hydration fallback");',
          )
          entry.write_text(js)

          css = sorted(assets.glob('styles-*.css'))
          style_tag = f'<link rel="stylesheet" href="./assets/{css[0].name}">' if css else ''

          Path('mobile-dist/client/index.html').write_text(f'''<!DOCTYPE html>
          <html lang="fr" class="dark">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
          <title>SC Technologie</title>
          <style>html,body,#root{{min-height:100%;margin:0;background:#07111f;color:#f8fafc}}.native-loading{{min-height:100vh;display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-align:center}}</style>
          {style_tag}
          <script type="module" crossorigin src="./assets/{entry.name}"></script><script src="https://cdn.jsdelivr.net/npm/eruda"></script><script>eruda.init()</script>
          </head>
          <body><div id="root"><div class="native-loading">Chargement de SC Technologie…</div></div></body>
          </html>
          ''')
          PY
      - name: Capacitor sync
        script: |
          npx cap sync ios
          CURRENT=$(grep -m1 "CURRENT_PROJECT_VERSION" ios/App/App.xcodeproj/project.pbxproj | grep -o '[0-9][0-9]*' | head -1)
          NEW=$((CURRENT + 1))
          echo "DEBUG: CURRENT=$CURRENT NEW=$NEW"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $NEW/g" ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1,2"/TARGETED_DEVICE_FAMILY = "1"/g' ios/App/App.xcodeproj/project.pbxproj

      - name: Verify native bundle
        script: test -s ios/App/App/public/index.html && test -d ios/App/App/public/assets
      - name: Install certificate
        script: |
          echo $CERTIFICATE_PRIVATE_KEY | base64 --decode > /tmp/certificate.p12
          keychain initialize
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CERTIFICATE_PASSWORD
          echo $PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          xcode-project use-profiles --profile /tmp/profile.mobileprovision
      - name: Bump build number
        script: |
          cd ios/App
          NEW=$(($(agvtool what-version -terse) + 1))
          agvtool new-version -all $NEW
          echo "NEW=$NEW" >> $CM_ENV
          cd ../..
      - name: Build iOS
        script: |
          UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          xcodebuild -workspace ios/App/App.xcodeproj/project.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="SC Technologie Distribution" \
            CODE_SIGN_IDENTITY="Apple Distribution: Jacques Camara (3QSRLS3CV4)" \
            archive
      - name: Export and Upload IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build
          xcrun altool --upload-app \
            -f build/App.ipa \
            -t ios \
            -u "$APP_STORE_EMAIL" \
            -p "$APP_STORE_PASSWORD"
       
      - name: Commit new build number
        script: |
          git config user.email "codemagic@ci.local"
          git config user.name "Codemagic CI"
          git add ios/App/App.xcodeproj/project.pbxproj
          git commit -m "ci: bump build number to $NEW [skip ci]" || echo "Nothing to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/jacquescamara02-coder/sc-technology.git main || echo "Push failed, check GitHub write permissions"
    artifacts:
      - build/App.xcarchive
      - build/App.ipa
