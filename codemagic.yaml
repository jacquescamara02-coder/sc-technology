workflows:
  ios-workflow:
    name: SC Technologie iOS
    max_build_duration: 60
    environment:
      xcode: latest
      node: latest
      groups:
        - ios_credentials
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web
        script: npx vite build --outDir=mobile-dist/client --mode development
      - name: Create native index.html
        script: |
          MAIN_JS=$(python3 - <<'PY'
          from pathlib import Path
          for p in Path('mobile-dist/client/assets').glob('*.js'):
              text = p.read_text(errors='ignore')
              if 'hydrateRoot(document' in text and 'SC TECHNOLOGIE' in text:
                  print(p.name)
                  break
          PY
          )
          MAIN_CSS=$(python3 - <<'PY'
          from pathlib import Path
          css = sorted(Path('mobile-dist/client/assets').glob('styles-*.css'))
          print(css[0].name if css else '')
          PY
          )
          test -n "$MAIN_JS"
          cat > mobile-dist/client/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="fr" class="dark">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
          <title>SC Technologie</title>
          __STYLE_TAG__
          <script type="module" crossorigin src="./assets/__MAIN_JS__"></script>
          </head>
          <body>
          </body>
          </html>
          HTML
          if [ -n "$MAIN_CSS" ]; then
            STYLE_TAG="<link rel=\"stylesheet\" href=\"./assets/$MAIN_CSS\">"
          else
            STYLE_TAG=""
          fi
          python3 - <<PY
          from pathlib import Path
          p = Path('mobile-dist/client/index.html')
          html = p.read_text()
          html = html.replace('__MAIN_JS__', '$MAIN_JS').replace('__STYLE_TAG__', '$STYLE_TAG')
          p.write_text(html)
          PY
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install certificate
        script: |
          echo $CERTIFICATE_PRIVATE_KEY | base64 --decode > /tmp/certificate.p12
          keychain initialize
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CERTIFICATE_PASSWORD
          echo $PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          xcode-project use-profiles --profile /tmp/profile.mobileprovision
      - name: Build iOS
        script: |
          UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          xcodebuild -workspace ios/App/App.xcodeproj/project.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="SC Technologie Distribution" \
            CODE_SIGN_IDENTITY="Apple Distribution: Jacques Camara (3QSRLS3CV4)" \
            archive
      - name: Export and Upload IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build
          xcrun altool --upload-app \
            -f build/App.ipa \
            -t ios \
            -u "$APP_STORE_EMAIL" \
            -p "$APP_STORE_PASSWORD"
    artifacts:
      - build/App.xcarchive
      - build/App.ipa
